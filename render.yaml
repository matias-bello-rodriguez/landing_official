# Blueprint (IaC): https://render.com/docs/infrastructure-as-code
# Sitio estático Astro → salida en dist/
services:
  - type: web
    name: pymatica-landing
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "20"
